naftiko: 1.0.0-alpha2
info:
  label: State Farm Insurance Companies Renters API — Policies
  description: 'State Farm Insurance Companies Renters API — Policies. 2 operations. Lead operation: Bind Renters Insurance
    Policy. Self-contained Naftiko capability covering one State Farm Insurance Cos business surface.'
  tags:
  - State Farm Insurance Cos
  - Policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATE_FARM_INSURANCE_COS_API_KEY: STATE_FARM_INSURANCE_COS_API_KEY
capability:
  consumes:
  - type: http
    namespace: renters-policies
    baseUri: https://api.statefarm.com/v1
    description: State Farm Insurance Companies Renters API — Policies business capability. Self-contained, no shared references.
    resources:
    - name: renters-policies
      path: /renters/policies
      operations:
      - name: createrenterspolicy
        method: POST
        description: Bind Renters Insurance Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: renters-policies-policyNumber
      path: /renters/policies/{policyNumber}
      operations:
      - name: getrenterspolicy
        method: GET
        description: Get Renters Insurance Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: policyNumber
          in: path
          type: string
          description: State Farm policy number
          required: true
    authentication:
      type: bearer
      token: '{{env.STATE_FARM_INSURANCE_COS_API_KEY}}'
  exposes:
  - type: rest
    namespace: renters-policies-rest
    port: 8080
    description: REST adapter for State Farm Insurance Companies Renters API — Policies. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/renters/policies
      name: renters-policies
      description: REST surface for renters-policies.
      operations:
      - method: POST
        name: createrenterspolicy
        description: Bind Renters Insurance Policy
        call: renters-policies.createrenterspolicy
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/renters/policies/{policynumber}
      name: renters-policies-policynumber
      description: REST surface for renters-policies-policyNumber.
      operations:
      - method: GET
        name: getrenterspolicy
        description: Get Renters Insurance Policy
        call: renters-policies.getrenterspolicy
        with:
          policyNumber: rest.policyNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: renters-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for State Farm Insurance Companies Renters API — Policies. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: bind-renters-insurance-policy
      description: Bind Renters Insurance Policy
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: renters-policies.createrenterspolicy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-renters-insurance-policy
      description: Get Renters Insurance Policy
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: renters-policies.getrenterspolicy
      with:
        policyNumber: tools.policyNumber
      outputParameters:
      - type: object
        mapping: $.
