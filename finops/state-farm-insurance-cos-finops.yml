principles:
  - name: Visibility
    description: Visibility is whatever reporting the negotiated B2B contract exposes — there is no public
      State Farm usage or billing API.
  - name: Allocation
    description: Allocate the partnership cost line in your own ERP; State Farm does not provide a self-serve
      cost breakdown.
  - name: Optimization
    description: Optimization happens at contract / SLA renegotiation, not via a self-serve plan change.
  - name: Accountability
    description: A single business owner of the State Farm partnership relationship should own the engagement
      cost line and renewal.
